<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header><div class="titre">Calcul du Taux d'Intérêt</div></header>
    <form action="">
    <div class="premier_input">
    <span>Capital emprunté <input id="capital" placeholder="text" type=""></span>
    <span>Taux nominal annuel<input id="taux"placeholder="text" type="text"></span>
    <span> Durée d'emprunt <input id="duree"placeholder="text" type="text"></span>
</div>
<div class="second_input">
    <span> Mensualité <input placeholder="mens" id="mensualite"></input></span>
   <span>Cout Total <input placeholder="total" id="total"></input></span>
</div>
<div class="boutons">
    <button id="calc"type="submit" title="calculer">Calculer</button>
    <button type="reset" title="reset">Nouveau Calcul</button>
</div>
</form>
<script src="script.js"></script>
</body>
</html>
