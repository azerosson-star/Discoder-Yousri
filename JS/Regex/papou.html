<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input:valid {
            background-color: palegreen;
        }

        input:invalid {
            background-color: lightpink;
        }
    </style>
</head>

<body>
    <div><input type="text" id="prenom" placeholder="prénom" required pattern="^[A-Za-z0-9]+-?[A-Za-z0-9]*$"></div>
    <div><input type="text" id="nom" placeholder="nom" required pattern="^[A-Za-z0-9]+(-|--)?[A-Za-z0-9]*$"></div>
    <div><input type="text" id="email" placeholder="email" required
            pattern="^[A-Za-z]([\.\-]?[A-Za-z0-9])+@[A-Za-z]([\.\-]?[A-Za-z0-9])+\.[A-Za-z]{2,4}$"></div>
    <div><input type="text" id="mdp" placeholder="mdp" required
            pattern="^(?=.[A-Z])(?=.[a-z])(?=.[0-9])(?=.[\W_])([a-zA-Z0-9\W_]{8,})$"></div>
    <div><input type="password" id="mdpC" placeholder="mdp caché" required
            pattern="^(?=.[A-Z])(?=.[a-z])(?=.[0-9])(?=.[\W_])([a-zA-Z0-9\W_]{8,})$"></div>
    <div><input type="text" id="postal" placeholder="postal" required pattern="^(?:0[1-9]|[1-8]\d|9[0-8])\d{3}$"></div>
  <div><input type="text" placeholder="tel" required pattern="^0[0-9]([\-/. ]?[0-9]{2}){4}$"></div>
    <div><input type="text" id="col" placeholder="couleur" required pattern="^[a-f0-9]{6}$"></div>
    <div><input type="text" id="dateSp" placeholder="date" required pattern="^\d{2}-\d{2}-\d{4}$"></div>
    <div><input type="date" id="dateAp" required pattern="^\d{2}-\d{2}-\d{4}$"></div>
    <script src="regex.js"></script>
</body>

</html>
