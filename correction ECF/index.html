<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Calcul mensualité</title>
    <link href="style.css" rel="stylesheet">

</head>

<body class="colonne">
    <header>
        <div class="haut">
        <div class="logo">
            
                <img src="logo.png" alt="">
            </div>
            <div class="titre">
                <h1>Calcul du Taux d'intérêt</h1>
            </div>
        </div>
    </header>
    <section>
        <div class="side"></div>
        <div class=" colonne">
        <div class="espace"></div>
            <fieldset>
                <div class="section">
                    <div class="label"> Capital Emprunté</div>
                    <div> <input id="capital" type="number" pattern="^[0-9]+$" required></div>
                    <div class="unite"> €</div>
                    <div class="message">etnqenbebn</div>
                </div>
                <div class="section">
                    <div class="label"> Taux Nominal Annuel</div>
                    <div><input id="taux" type="number" min="0.00" max="100.00" step="0.01"
                            pattern="^[0-9]+([.,][0-9]{1,2})?$|100.00" required></div>
                    <div class="unite"> %</div>
                    <div class="message">rrf</div>
                </div>
                <div class="section">
                    <div class="label"> Durée d'emprunt</div>
                    <div> <input id="duree" type="number" min="0.00" max="100.00" step="0.5" pattern="^[0-9]*$"
                            required></div>
                    <div class="unite"> ans</div>
                    <div class="message"></div>
                </div>
            </fieldset>
            <fieldset class="grande_section">
                <div class="section2">
                    <div class="label"> Mensualité</div>
                    <div> <input id="mens" disabled></div>
                    <div class="unite"> €</div>
                    <div class="message"></div>
                </div>
                <div class="section2">
                    <div class="label"> Coût Total</div>
                    <div> <input id="cout" disabled></div>
                    <div class="unite"> €</div>
                    <div class="message"></div>
                </div>
            </fieldset>
            <div class="section3 ">
                
                <div><button id="calcul" disabled>Calculer</button></div>
              
                <div><button id="reset">Nouveau Calcul</button></div>
                
            </div>
        </div>
        <div class="side"></div>
    </section>

</body>
<script src="script.js"></script>

</html>
